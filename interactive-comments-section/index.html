<!DOCTYPE html>
<html lang="en">

<head>
    <title>interactive comments section</title>
    <link rel="image/png" href="./images/favicon-32x32.png" sizes="favicon-32x32">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.google.com/specimen/Rubik" rel="stylesheet">

</head>

<body>
    <div class="main">
        <div class="comments">
            <div class="commentcard">
                <div class="fontsize-changer">
                    <img src="./images/icon-plus.svg" alt="plus" class="plus">
                    <span class="font-size">12</span>
                    <img src="./images/icon-minus.svg" alt="minus" class="minus">
                </div>
                <div class="top-section">
                    <div class="img-div">

                        <img src="./images/avatars/image-amyrobson.png" alt="avatar" class="avatar">
                    </div>
                    <span class="name">name</span>
                    <span class="age">1 month ago</span>
                    <div class="reply">
                        <img src="./images/icon-reply.svg" alt="reply" class="reply-img">
                        <span class="reply-text">reply</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
