<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sri Karthikeya - social links Profile </title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
</head>

<body class="bod">
  <div class="main-card">
    <div class="img-card">
      <img src="./assets/images/avatar-jessica.jpeg" class="img">
    </div>
    <div class="content">
      <span style="color: white; font-family: 'Inter'; font-weight: 300; font: bold;">Jessica Randall</span>
      <span style="color: hsl(75, 94%, 57%); font-family: 'Inter'; font-weight: 200; font-size: 10px;"> London, United
        Kingdom</span>
      <span style="color: white; font-family: 'Inter'; font-weight: 200; font-size: 10px; margin-top: 18px;"> "Front-end
        developer and avid reader."</span>
    </div>

    <div class="btn-card">
      <a href="https://github.com/" target="_blank" class="btn">
        <button class="btn">GitHub</button>
      </a>
      <a href="https://www.frontendmentor.io/" target="_blank" class="btn">
        <button class="btn">Frontend Mentor</button>
      </a>
      <a href="https://www.linkedin.com/" target="_blank" class="btn">
        <button class="btn">LinkedIn</button>
      </a>
      <a href="https://twitter.com/" target="_blank" class="btn">
        <button class="btn">Twitter</button>
      </a>
      <a href="https://www.instagram.com/" target="_blank" class="btn">
        <button class="btn">Instagram</button>
      </a>

    </div>

  </div>

</body>

</html>
